[mod-name]
zk-lib=ZwerOxotnik的可扩展模组
kill-nest-get-gifts=摧毁虫巢获得礼物
random-gifts-by-timer=定时随机礼物
delete_decorations=删除装饰
searching-flashlight=“搜索手电筒” rk84修复版 Xagros
CopyAssemblerPipeDirection=复制组装机管道方向

[mod-description]
zk-lib=我将在下个主要更新中添加通用命令小部件\n\n多功能模组，带可切换附加组件\n\n同时支持自动生成的模组等。
kill-nest-get-gifts=当你摧毁虫巢时，会获得随机物品。
random-gifts-by-timer=每隔N时间给在线玩家一个随机物品。
delete_decorations=删除地图上的所有装饰（目前仅在生成新区块时生效）。
searching-flashlight=若保持静止，你将自动转向在地图上选中的任何实体。
CopyAssemblerPipeDirection=将配方粘贴到组装机时，会复制源组装机的管道方向

[mod-setting-name]
#zk_commands=控制台命令
zk-lib_safe-mode=安全模式
zk-lib-warn-about-addons=[color=orange]关于附加组件的注意*[/color]

[mod-setting-description]
#zk_commands=打开/关闭本库的控制台命令
zk-lib_safe-mode=当玩家更改附加组件状态时保存游戏
zk-lib-warn-about-addons=附加组件与模组不同，可能比模组更好。可能会出现新错误。\n我并不是在开发异星工厂，没有人给我付报酬，我其他约69个模组也是如此。既然没人在意，任何计划/新闻都不会对你有影响。

[zk-lib]
addons=附加组件
turn-on-addon-on-start=请在“模组设置”->“启动”中启用“__1__”附加组件，并在“模组设置”->“地图”中启用，才能将其用作附加组件。
insecure-addon=此附加组件不安全，使用前请确保已在“模组设置”->“启动”中启用。


